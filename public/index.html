        // --- CUSTOM HOOK PARA PREFERENCIAS (Solo Theme) ---
        function useLocalStorage(key, initialValue) {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) {
                    return initialValue;
                }
            });

            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) {
                    console.error("Error guardando", error);
                }
            };
            return [storedValue, setValue];
        }

        function getStatusStyles(status) {
            switch(status) {
                case 'pendiente': return 'bg-yellow-100 text-yellow-800 border-yellow-200 dark:bg-yellow-900/30 dark:text-yellow-400 dark:border-yellow-900/50';
                case 'vendido': return 'bg-blue-100 text-blue-800 border-blue-200 dark:bg-blue-900/30 dark:text-blue-400 dark:border-blue-900/50';
                case 'pagado': return 'bg-green-100 text-green-800 border-green-200 dark:bg-green-900/30 dark:text-green-400 dark:border-green-900/50';
                case 'transferido': return 'bg-purple-100 text-purple-800 border-purple-200 dark:bg-purple-900/30 dark:text-purple-400 dark:border-purple-900/50';
                case 'cancelado': return 'bg-red-100 text-red-800 border-red-200 dark:bg-red-900/30 dark:text-red-400 dark:border-red-900/50';
                default: return 'bg-gray-100 text-gray-800 border-gray-200 dark:bg-gray-800 dark:text-gray-300 dark:border-gray-700';
            }
        }

        // --- APLICACIÓN PRINCIPAL ---
        function App() {
            // Estado de Autenticación de Firebase
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [loginEmail, setLoginEmail] = useState('');
            const [loginPassword, setLoginPassword] = useState('');
            const [loginError, setLoginError] = useState('');

            // Preferencias Locales
            const [isDarkMode, setIsDarkMode] = useLocalStorage('ordify_theme', false);
            
            // Estado de Datos desde Firebase
            const [orders, setOrders] = useState([]);
            const [isDbLoaded, setIsDbLoaded] = useState(false);

            // Estado Pestañas e UI
            const [activeTab, setActiveTab] = useState('pedidos');
            const [searchQuery, setSearchQuery] = useState('');
            const [filterStatus, setFilterStatus] = useState('todos');
            const [filterSeller, setFilterSeller] = useState('todos');
            const [filterPayment, setFilterPayment] = useState('todos');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingOrder, setEditingOrder] = useState(null);

            // 1. Efecto: Escuchar estado de autenticación de Firebase
            useEffect(() => {
                const unsubscribeAuth = auth.onAuthStateChanged((currentUser) => {
                    setUser(currentUser);
                    setAuthLoading(false);
                    // Si se desloguea, limpiar datos
                    if (!currentUser) {
                        setOrders([]);
                        setIsDbLoaded(false);
                    }
                });

                return () => unsubscribeAuth();
            }, []);

            // 2. Efecto: Sincronización con Firestore
            useEffect(() => {
                if (!user) return; // Solo si hay usuario
                
                const unsubscribeDb = db.collection('orders').onSnapshot((snapshot) => {
                    const loadedOrders = [];
                    snapshot.forEach(doc => {
                        loadedOrders.push({ id: doc.id, ...doc.data() });
                    });
                    setOrders(loadedOrders);
                    setIsDbLoaded(true);
                }, (error) => {
                    console.error("Error cargando de Firebase:", error);
                    if (error.code === 'permission-denied') {
                        alert("Error de permisos en Firestore. Asegúrate de que las reglas permitan acceso.");
                    }
                    setIsDbLoaded(true); 
                });

                return () => unsubscribeDb();
            }, [user]);

            // Lógica de Autenticación
            const handleLogin = async (e) => {
                e.preventDefault();
                setLoginError('');
                try {
                    await auth.signInWithEmailAndPassword(loginEmail, loginPassword);
                } catch (error) {
                    console.error("Error de login:", error);
                    setLoginError('Correo o contraseña incorrectos.');
                }
            };

            const handleLogout = async () => {
                try {
                    await auth.signOut();
                } catch (error) {
                    console.error("Error al cerrar sesión:", error);
                }
            };

            // Lógica de fechas
            const getNextFriday = (date) => {
                const d = new Date(date);
                const day = d.getDay();
                const diff = (day <= 5) ? (5 - day) : (12 - day);
                d.setDate(d.getDate() + diff);
                d.setHours(23, 59, 59, 999);
                return d;
            };

            const thisFriday = getNextFriday(new Date());
            const lastFriday = new Date(thisFriday);
            lastFriday.setDate(lastFriday.getDate() - 7);

            // Cálculos del Dashboard
            const dashboardData = useMemo(() => {
                const thisWeekOrders = orders.filter(o => {
                    const d = new Date(o.created_at);
                    return d > lastFriday && d <= thisFriday;
                });

                const totalDinero = thisWeekOrders.reduce((sum, o) => sum + ((Number(o.price) || 0) * Number(o.quantity)), 0);
                const totalUnidades = thisWeekOrders.reduce((sum, o) => sum + Number(o.quantity), 0);
                
                const pagados = thisWeekOrders.filter(o => o.status === 'pagado' || o.status === 'transferido');
                const adeudados = thisWeekOrders.filter(o => o.status === 'pendiente' || o.status === 'vendido');
                
                const dineroPagado = pagados.reduce((sum, o) => sum + ((Number(o.price) || 0) * Number(o.quantity)), 0);
                const dineroAdeudado = adeudados.reduce((sum, o) => sum + ((Number(o.price) || 0) * Number(o.quantity)), 0);
                
                const porcentajePagado = totalDinero > 0 ? (dineroPagado / totalDinero) * 100 : 0;

                return { thisWeekOrders, totalDinero, totalUnidades, pagados, adeudados, dineroPagado, dineroAdeudado, porcentajePagado };
            }, [orders, thisFriday, lastFriday]);

            // Filtrado de Pedidos
            const filteredOrders = useMemo(() => {
                return orders.filter(order => {
                    const matchesSearch = order.buyer_name.toLowerCase().includes(searchQuery.toLowerCase()) || order.seller_name.toLowerCase().includes(searchQuery.toLowerCase());
                    const matchesStatus = filterStatus === 'todos' || order.status === filterStatus;
                    const matchesSeller = filterSeller === 'todos' || order.seller_name === filterSeller;
                    const matchesPayment = filterPayment === 'todos' || order.payment_method === filterPayment;
                    return matchesSearch && matchesStatus && matchesSeller && matchesPayment;

                        await db.collection('orders').doc(editingOrder.id).update(updatedData);

                        updatedData.created_at = new Date().toISOString();

                                <div>
                                    <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Comprador *</label>
                                    <input type="text" className={`w-full p-2.5 bg-white dark:bg-gray-900 dark:text-white border rounded-lg focus:ring-2 focus:ring-primary outline-none ${errors.buyer_name ? 'border-red-500' : 'border-gray-300 dark:border-gray-600'}`} value={formData.buyer_name} onChange={e => setFormData({...formData, buyer_name: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Vendedor *</label>
                                    <input type="text" className={`w-full p-2.5 bg-white dark:bg-gray-900 dark:text-white border rounded-lg focus:ring-2 focus:ring-primary outline-none ${errors.seller_name ? 'border-red-500' : 'border-gray-300 dark:border-gray-600'}`} value={formData.seller_name} onChange={e => setFormData({...formData, seller_name: e.target.value})} />
                                </div>
                            </div>
                            
                            <div className="grid grid-cols-2 gap-4 bg-blue-50/50 dark:bg-gray-900/50 p-4 rounded-xl border border-blue-100 dark:border-gray-700">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Cantidad *</label>
                                    <input type="number" min="1" className="w-full p-2.5 bg-white dark:bg-gray-900 dark:text-white border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary outline-none font-bold text-lg" value={formData.quantity} onChange={e => setFormData({...formData, quantity: Number(e.target.value)})} />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Precio Unitario ($)</label>
                                    <input type="number" min="0" placeholder="Ej: 1500" className="w-full p-2.5 bg-white dark:bg-gray-900 dark:text-white border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary outline-none text-green-600 dark:text-green-400 font-bold text-lg" value={formData.price} onChange={e => setFormData({...formData, price: e.target.value})} />
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Estado del Pedido</label>
                                    <select className="w-full p-2.5 bg-white dark:bg-gray-900 dark:text-white border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary outline-none" value={formData.status} onChange={e => setFormData({...formData, status: e.target.value, transferred_to: e.target.value !== 'transferido' ? '' : formData.transferred_to})}>
                                        <option value="pendiente">Pendiente</option>
                                        <option value="vendido">Vendido</option>
                                        <option value="pagado">Pagado</option>
                                        <option value="transferido">Transferido</option>
                                        <option value="cancelado">Cancelado</option>
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Método de Pago</label>
                                    <select className="w-full p-2.5 bg-white dark:bg-gray-900 dark:text-white border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary outline-none" value={formData.payment_method} onChange={e => setFormData({...formData, payment_method: e.target.value})}>
                                        <option value="pendiente">Pendiente ⚪</option>
                                        <option value="efectivo">Efectivo 🟢</option>
                                        <option value="transferencia">Transferencia 🔵</option>
                                    </select>
                                </div>
                            </div>

                            {formData.status === 'transferido' && (
                                <div className="bg-purple-50 dark:bg-purple-900/20 p-4 rounded-xl border border-purple-200 dark:border-purple-800">
                                    <label className="block text-sm font-bold text-purple-700 dark:text-purple-400 mb-1">Transferido a (Nombre/Alias) *</label>
                                    <input type="text" placeholder="Ej. Juan Perez" className={`w-full p-2.5 bg-white dark:bg-gray-900 dark:text-white border rounded-lg outline-none focus:ring-2 focus:ring-purple-500 ${errors.transferred_to ? 'border-red-500' : 'border-purple-200 dark:border-purple-700'}`} value={formData.transferred_to || ''} onChange={e => setFormData({...formData, transferred_to: e.target.value})} />
                                </div>
                            )}

                            <div>
                                <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Lugar de Entrega</label>
                                <select className="w-full p-2.5 bg-white dark:bg-gray-900 dark:text-white border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary outline-none" value={formData.delivery_type} onChange={e => setFormData({...formData, delivery_type: e.target.value})}>
                                    <option value="retiro_vendedor">Retiro Vendedor</option>
                                    <option value="retiro_comprador">Retiro Comprador</option>
                                </select>
                            </div>

                            <div className="pt-4 mt-6 border-t border-gray-100 dark:border-gray-700 flex justify-end gap-3">
                                <button type="button" onClick={onClose} className="px-5 py-2.5 text-gray-600 dark:text-gray-300 font-medium hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors">Cancelar</button>
                                <button type="submit" className="px-6 py-2.5 bg-primary text-white font-bold hover:bg-primary-light rounded-lg flex items-center gap-2 shadow-lg shadow-primary/30 transition-all">
                                    <IconCheckCircle2 className="w-5 h-5"/> Guardar Pedido
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        // Renderizado de React
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
